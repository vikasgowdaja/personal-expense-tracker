name: Azure App Service Container Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/personal-ops-backend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/personal-ops-backend:latest

      - name: Validate Backend Web App Target
        shell: bash
        env:
          WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_BACKEND_NAME }}
        run: |
          if [ -z "$WEBAPP_NAME" ]; then
            echo "::error::Missing secret AZURE_WEBAPP_BACKEND_NAME."
            exit 1
          fi

          SUB_NAME=$(az account show --query name -o tsv)
          SUB_ID=$(az account show --query id -o tsv)
          echo "Using subscription: $SUB_NAME ($SUB_ID)"
          echo "Backend target app-name: $WEBAPP_NAME"

          MATCH_COUNT=$(az webapp list --query "[?name=='$WEBAPP_NAME'] | length(@)" -o tsv)
          if [ "$MATCH_COUNT" = "0" ]; then
            echo "::error::Azure Web App '$WEBAPP_NAME' was not found in the current subscription."
            echo "::error::Fix AZURE_WEBAPP_BACKEND_NAME or update AZURE_CREDENTIALS to the correct subscription."
            exit 1
          fi

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_BACKEND_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/personal-ops-backend:${{ github.sha }}

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            REACT_APP_API_BASE_URL=${{ secrets.BACKEND_API_URL }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/personal-ops-frontend:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/personal-ops-frontend:latest

      - name: Validate Frontend Web App Target
        shell: bash
        env:
          WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_FRONTEND_NAME }}
        run: |
          if [ -z "$WEBAPP_NAME" ]; then
            echo "::error::Missing secret AZURE_WEBAPP_FRONTEND_NAME."
            exit 1
          fi

          SUB_NAME=$(az account show --query name -o tsv)
          SUB_ID=$(az account show --query id -o tsv)
          echo "Using subscription: $SUB_NAME ($SUB_ID)"
          echo "Frontend target app-name: $WEBAPP_NAME"

          MATCH_COUNT=$(az webapp list --query "[?name=='$WEBAPP_NAME'] | length(@)" -o tsv)
          if [ "$MATCH_COUNT" = "0" ]; then
            echo "::error::Azure Web App '$WEBAPP_NAME' was not found in the current subscription."
            echo "::error::Fix AZURE_WEBAPP_FRONTEND_NAME or update AZURE_CREDENTIALS to the correct subscription."
            exit 1
          fi

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_FRONTEND_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/personal-ops-frontend:${{ github.sha }}
