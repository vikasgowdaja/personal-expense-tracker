services:
  - type: web
    name: personal-ops-intelligence
    env: node
    plan: starter
    buildCommand: npm install --include=dev && npm install --prefix frontend --include=dev && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: CORS_ORIGINS
        sync: false
